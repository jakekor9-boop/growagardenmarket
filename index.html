<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow A Garden Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="logo">🌱 GrowAGardenMarket</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Buy Plants</a>
            <a href="#">Sell Your Harvest</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Welcome Section -->
    <section class="hero">
        <h1>Welcome to the Ultimate Garden Marketplace</h1>
        <p>Buy and sell fresh produce, seeds, and local plants in your community.</p>
        <button class="cta-btn">Browse Listings</button>
    </section>

    <!-- Featured Products / Market Grid Placeholder -->
    <main class="market-grid">
        <!-- Item Card 1 -->
        <div class="product-card">
            <div class="product-img">[ Plant Image ]</div>
            <h3>Organic Tomato Seeds</h3>
            <p class="price">$3.50</p>
            <button>View Details</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GrowAGardenMarket. All rights reserved.</p>
    </footer>

</body>
</html>
