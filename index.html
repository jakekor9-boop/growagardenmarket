<!-- Card: Ghost Pepper (FIXED) -->
<div class="store-card product-item">
    <div class="card-img" style="background-color: #f97316; position: relative;">
        <img src="ghost_pepper.png" style="max-height: 90%; max-width: 90%; object-fit: contain;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <span style="display:none; font-size:48px;">🌶️</span>
        <span class="rarity-badge">MYTHIC</span>
    </div>
    <div class="card-info">
        <h3>Ghost Pepper</h3>
        <p class="card-desc">Legendary spicy crop entry.</p>
        <div class="price-row">
            <span class="price">$1.50</span>
            <div class="quantity-control">
                <button class="qty-btn minus-btn">-</button>
                <input type="text" class="qty-input" value="1" readonly>
                <button class="qty-btn plus-btn">+</button>
                <button class="add-btn">Add</button>
            </div>
        </div>
    </div>
</div>
